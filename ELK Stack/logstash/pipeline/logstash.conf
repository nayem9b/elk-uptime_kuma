# =============================================================================
#  logstash/pipeline/logstash.conf
#
#  Pipeline: Filebeat → Logstash → Elasticsearch
#
#  Auto-detects three log formats:
#    1. JSON lines
#    2. Nginx combined access log
#    3. Plain text  (with optional log-level extraction)
# =============================================================================

input {
  beats {
    port => 5044
  }
}

# ---------------------------------------------------------------------------
filter {

  # ── 1. Try to parse as JSON ───────────────────────────────────────────────
  json {
    source         => "message"
    target         => "json_parsed"
    skip_on_invalid_json => true
    tag_on_failure => []   # silence — we handle fallback below
  }

  if [json_parsed] {
    mutate {
      add_field  => { "log_format" => "json" }
      rename     => { "[json_parsed][level]" => "log_level"  }
      rename     => { "[json_parsed][timestamp]" => "@timestamp" }
    }
    # Merge all parsed JSON fields to the root
    ruby {
      code => '
        if event.get("json_parsed").is_a?(Hash)
          event.get("json_parsed").each { |k, v| event.set(k, v) }
        end
        event.remove("json_parsed")
      '
    }

  # ── 2. Try Nginx combined access log ──────────────────────────────────────
  } else if ![json_parsed] {
    grok {
      match => {
        "message" => '%{IPORHOST:remote_addr} - %{DATA:remote_user} \[%{HTTPDATE:time_local}\] "%{WORD:http_method} %{URIPATHPARAM:request_uri} HTTP/%{NUMBER:http_version}" %{NUMBER:status:int} %{NUMBER:bytes_sent:int} "%{DATA:http_referer}" "%{DATA:http_user_agent}"'
      }
      tag_on_failure => ["_not_nginx"]
    }

    if "_not_nginx" not in [tags] {
      mutate { add_field => { "log_format" => "nginx_access" } }
      date {
        match    => ["time_local", "dd/MMM/yyyy:HH:mm:ss Z"]
        target   => "@timestamp"
        remove_field => ["time_local"]
      }
      # Geo-enrich the client IP (needs the geoip database bundled with Logstash)
      geoip { source => "remote_addr" target => "geoip" }

    # ── 3. Try common syslog format ─────────────────────────────────────────
    } else if "_not_nginx" in [tags] {
      grok {
        match => {
          "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{IPORHOST:syslog_host} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}"
        }
        tag_on_failure => ["_not_syslog"]
      }

      if "_not_syslog" not in [tags] {
        mutate { add_field => { "log_format" => "syslog" } }
        date {
          match  => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
          target => "@timestamp"
          remove_field => ["syslog_timestamp"]
        }

      # ── 4. Plain-text fallback ─────────────────────────────────────────────
      } else if "_not_syslog" in [tags] {
        mutate { add_field => { "log_format" => "plain" } }
        # Extract log level if present anywhere in the line
        grok {
          match => { "message" => "(?i)(?<log_level>DEBUG|INFO|WARN(?:ING)?|ERROR|CRITICAL|FATAL)" }
          tag_on_failure => []
        }
        if [log_level] {
          mutate { lowercase => ["log_level"] }
        }
      }
      # Close the else if "_not_syslog" in [tags] block

      # Clean up the failed-parse tags so they don't clutter Kibana
      mutate { remove_tag => ["_not_nginx", "_not_syslog", "_grokparsefailure"] }
    }
  }

  # ── Always set @timestamp if still missing ────────────────────────────────
  if ![@timestamp] {
    ruby { code => 'event.set("@timestamp", LogStash::Timestamp.now)' }
  }

  # Drop internal Filebeat / Logstash housekeeping fields
  mutate {
    remove_field => ["agent", "ecs", "input", "host", "log"]
  }
}

# ---------------------------------------------------------------------------
output {
  elasticsearch {
    hosts            => ["http://elasticsearch:9200"]
    # Daily index per format: logs-nginx_access-2024.01.01
    index            => "logs-%{log_format}-%{+YYYY.MM.dd}"
    action           => "index"
    http_compression => true
  }

  # Uncomment to also print events to Logstash stdout (useful for debugging)
  # stdout { codec => rubydebug }
}
